name: inventory_management
description: "LSENG 재고관리시스템"
publish_to: 'Gunho Lee'
version: 0.1.0

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  http: ^1.0.0
  provider: ^6.1.5
  flutter_spinbox: ^0.13.1
  intl: ^0.20.2
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - lib/assets/

flutter_launcher_icons:
  windows:
    generate: true
    image_path: "lib/assets/icon.png"
    icon_size: 256 # Optional: specify desired icon size (48-256)

